name: PyTest

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
    types: [ opened, synchronize, reopened ]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Python 3.11 / minimum direct dependencies
            python-version: "3.11"
            dependencies: minimum
          - name: Python 3.12 / locked dependencies
            python-version: "3.12"
            dependencies: locked
          - name: Python 3.13 / locked dependencies
            python-version: "3.13"
            dependencies: locked
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install minimum direct dependencies
        if: matrix.dependencies == 'minimum'
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install --resolution lowest-direct --editable ".[test]"

      - name: Install locked dependencies
        if: matrix.dependencies == 'locked'
        run: uv sync --python ${{ matrix.python-version }} --locked --all-extras --dev

      - name: Run tests
        run: .venv/bin/python -m pytest
        env:
          QT_QPA_PLATFORM: "offscreen"
